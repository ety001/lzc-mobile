[supervisord]
nodaemon=true
# 将 Supervisor 主进程日志输出到 stdout，由 Docker 日志驱动管理
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:webpanel]
command=/app/webpanel
autostart=true
autorestart=true
# 输出到 stdout/stderr，由 Docker 日志驱动管理，不会增加容器体积
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
user=root
# webpanel 必须先启动，渲染 Asterisk 配置文件
priority=100

[program:asterisk]
command=/bin/bash -c "sleep 15 && /usr/sbin/asterisk -f"
autostart=true
autorestart=true
# 输出到 stdout/stderr，由 Docker 日志驱动管理，不会增加容器体积
# 使用 Docker 的日志驱动（如 json-file）会将日志存储在宿主机上
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
user=asterisk
# Asterisk 后启动，等待 webpanel 渲染配置完成
# sleep 15 秒确保配置文件已生成
priority=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

# 注意：在容器内查看状态可以使用 supervisorctl -c /etc/supervisord.conf status
# 或者直接查看进程：ps aux | grep -E "(asterisk|webpanel)"
